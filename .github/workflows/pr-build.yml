name: PR Build

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build solution
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore NeuroNotes.slnx

      - name: Build
        run: dotnet build NeuroNotes.slnx --no-restore --configuration Release
